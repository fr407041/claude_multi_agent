services:
  claude-live-validator:
    build:
      context: .
      args:
        CLAUDE_CODE_VERSION: "2.1.207"
        CCR_VERSION: "3.0.3"
    image: multi-agent-claude-live-validator:local
    container_name: multi-agent-claude-live-validator
    restart: "no"
    environment:
      CCR_API_KEY: ${CCR_API_KEY:-local-router-token}
      ANTHROPIC_AUTH_TOKEN: ${CCR_API_KEY:-local-router-token}
      ANTHROPIC_API_KEY: ${CCR_API_KEY:-local-router-token}
      ANTHROPIC_BASE_URL: http://127.0.0.1:3456
      CCR_MESSAGES_URL: http://127.0.0.1:3456/v1/messages
      CCR_PREFERRED_MODEL: qwen3-coder:30b
      CLAUDE_MODEL_ALIAS: qwen3-coder:30b
      AI_COMPANY_LIVE_WORKER_TRANSPORT: ccr_http
      AI_COMPANY_PROJECT_ROOT: /workspace
    expose:
      - "3456"
    volumes:
      - ./:/workspace
      - ./config/ccr/config.json:/root/.claude-code-router/config.json:ro
      - ./artifacts:/workspace/artifacts
      - ./logs:/workspace/logs
      - ./results:/workspace/results
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:3456/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
